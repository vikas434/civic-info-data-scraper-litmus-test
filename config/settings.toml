# Civic Info Benchmark — Application Settings
# To switch models, change active_model to any id listed in [[models]] below.

active_model = "google/gemini-2.5-pro"
max_retries   = 3
timeout_seconds = 120
max_workers   = 1        # 1 = sequential (default). Use --workers N to override.
input_dir     = "input"
output_dir    = "output"
reports_dir   = "reports"
prompt_file   = "config/prompts/civic_lookup.md"

# ---------------------------------------------------------------------------
# Models — add or remove entries here. Pricing in USD per 1,000 tokens.
# Verify current rates at https://openrouter.ai/models
# ---------------------------------------------------------------------------

[[models]]
id             = "google/gemini-2.5-pro"
display_name   = "Gemini 2.5 Pro"
column_prefix  = "Gemini 2.5 Pro"
has_web_search = true
[models.pricing]
input_per_1k_tokens  = 0.00125
